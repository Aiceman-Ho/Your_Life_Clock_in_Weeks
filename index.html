<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
    <!-- 網站的終極標題 (顯示在 Google 搜尋結果最大字的地方) -->
    <title>人生週數表 (Life in Weeks) | 你的 90 年生命時鐘</title>
  
    <!-- 網站的詳細描述 (顯示在 Google 搜尋結果下方的兩行灰字) -->
    <meta name="description" content="這是一個基於第一性原理打造的開源生命時鐘。輸入你的生日，將 90 年的生命具象化為 4,680 個方塊。幫助你直視時間的流逝，把握當下的每一刻。" />
  
    <!-- 告訴 Google 這個網站跟哪些關鍵字有關 -->
    <meta name="keywords" content="人生週數表, Life in Weeks, 生命時鐘, 時間管理, 斯多葛學派, 倒數計時, 生日計算, 第一性原理" />
  
    <!-- 作者資訊 -->
    <meta name="author" content="你的名字 (例如: Aiceman Ho)" />

    <!-- Open Graph 標籤 (當你把網址貼給朋友、LINE 或 FB 時，會顯示的精美卡片資訊) -->
    <meta property="og:title" content="人生週數表 (Life in Weeks)" />
    <meta property="og:description" content="將你的 90 年生命具象化為 4,680 個方塊，看看你已經走到了哪裡。" />
    <meta property="og:type" content="website" />
  </head>
